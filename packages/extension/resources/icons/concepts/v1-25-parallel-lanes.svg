<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background to ensure visibility -->
  <rect x="8" y="8" width="240" height="240" rx="18" fill="#0F172A"/>
  
  <!-- CRT-style frame -->
  <path d="M 34 8 
           Q 128 0, 222 8
           Q 252 8, 252 34
           Q 256 128, 252 222
           Q 252 252, 222 252
           Q 128 256, 34 252
           Q 4 252, 4 222
           Q 0 128, 4 34
           Q 4 8, 34 8 Z" 
        fill="none" 
        stroke="#FFFFFF" 
        stroke-width="7" 
        opacity="0.5"/>
  
  <!-- Six wider parallel lanes, better top/bottom usage -->
  <line x1="16" y1="48" x2="240" y2="48" stroke="#38BDF8" stroke-width="30" stroke-linecap="round"/>
  <line x1="16" y1="80" x2="240" y2="80" stroke="#38BDF8" stroke-width="30" stroke-linecap="round"/>
  <line x1="16" y1="112" x2="240" y2="112" stroke="#38BDF8" stroke-width="30" stroke-linecap="round"/>
  <line x1="16" y1="144" x2="240" y2="144" stroke="#38BDF8" stroke-width="30" stroke-linecap="round"/>
  <line x1="16" y1="176" x2="240" y2="176" stroke="#38BDF8" stroke-width="30" stroke-linecap="round"/>
  <line x1="16" y1="208" x2="240" y2="208" stroke="#38BDF8" stroke-width="30" stroke-linecap="round"/>
</svg>
