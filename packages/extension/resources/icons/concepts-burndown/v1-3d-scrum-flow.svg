<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <title>DevSteps v1.3d — Scrum Flow</title>
  <defs>
    <linearGradient id="v1d" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>
  <!-- Three columns with flow arrows to feel less abstract -->
  <rect x="14" y="26" width="28" height="88" rx="8" fill="url(#v1d)"/>
  <rect x="50" y="18" width="28" height="96" rx="8" fill="url(#v1d)" opacity="0.95"/>
  <rect x="86" y="26" width="28" height="88" rx="8" fill="url(#v1d)" opacity="0.8"/>
  <!-- Flow arrows between columns -->
  <polyline points="44,58 52,58 48,54" fill="none" stroke="#0F172A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="44,58 52,58 48,62" fill="none" stroke="#0F172A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="80,70 88,70 84,66" fill="none" stroke="#0F172A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="80,70 88,70 84,74" fill="none" stroke="#0F172A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Cards -->
  <rect x="18" y="40" width="20" height="10" rx="3" fill="#E2E8F0"/>
  <rect x="54" y="44" width="20" height="12" rx="3" fill="#0F172A" opacity="0.85"/>
  <rect x="90" y="78" width="20" height="10" rx="3" fill="#E2E8F0"/>
