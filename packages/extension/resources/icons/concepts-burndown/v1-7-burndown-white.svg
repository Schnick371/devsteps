<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-col-7" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-ideal-7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#94A3B8;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#64748B;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  
  <!-- White border frame (like old CRT TV with barrel distortion and rounded corners) -->
  <path d="M 32 6 
           Q 128 2, 224 6
           Q 250 6, 250 32
           Q 254 128, 250 224
           Q 250 250, 224 250
           Q 128 254, 32 250
           Q 6 250, 6 224
           Q 2 128, 6 32
           Q 6 6, 32 6 Z" 
        fill="none" 
        stroke="#FFFFFF" 
        stroke-width="7" 
        opacity="0.5"/>
  
  <!-- Three columns (larger, better space usage) -->
  <rect x="16" y="24" width="72" height="208" rx="10" fill="url(#grad-col-7)" opacity="0.7"/>
  <rect x="92" y="24" width="72" height="208" rx="10" fill="url(#grad-col-7)" opacity="0.7"/>
  <rect x="168" y="24" width="72" height="208" rx="10" fill="url(#grad-col-7)" opacity="0.7"/>
  
  <!-- Cards in columns - all top-to-bottom -->
  <!-- Left column (Backlog/To-Do) -->
  <rect x="24" y="36" width="56" height="36" rx="6" fill="#E0F2FE" opacity="0.9"/>
  <rect x="24" y="80" width="56" height="36" rx="6" fill="#E0F2FE" opacity="0.9"/>
  <rect x="24" y="124" width="56" height="36" rx="6" fill="#E0F2FE" opacity="0.9"/>
  
  <!-- Middle column (In Progress) -->
  <rect x="100" y="36" width="56" height="36" rx="6" fill="#E0F2FE" opacity="0.7"/>
  
  <!-- Right column (Done) - card at TOP -->
  <rect x="176" y="36" width="56" height="36" rx="6" fill="#E0F2FE" opacity="0.5"/>
  
  <!-- Ideal burndown line (dotted, less steep) -->
  <line x1="24" y1="32" x2="240" y2="190" 
        stroke="url(#grad-ideal-7)" 
        stroke-width="3" 
        stroke-dasharray="8,6"
        stroke-linecap="round"/>
  
  <!-- Actual burndown line (jagged WHITE, 5 points) -->
  <path d="M 24 32 L 78 55 L 132 95 L 186 148 L 240 185" 
        stroke="#FFFFFF" 
        stroke-width="4" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        fill="none"/>
</svg>
