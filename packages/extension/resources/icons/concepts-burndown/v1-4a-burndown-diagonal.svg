<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-col-a" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-burndown-a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EF4444;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Three columns (Kanban board) -->
  <rect x="32" y="64" width="56" height="160" rx="8" fill="url(#grad-col-a)" opacity="0.7"/>
  <rect x="100" y="64" width="56" height="160" rx="8" fill="url(#grad-col-a)" opacity="0.7"/>
  <rect x="168" y="64" width="56" height="160" rx="8" fill="url(#grad-col-a)" opacity="0.7"/>
  
  <!-- Cards in columns -->
  <rect x="40" y="80" width="40" height="28" rx="4" fill="#E0F2FE" opacity="0.9"/>
  <rect x="40" y="118" width="40" height="28" rx="4" fill="#E0F2FE" opacity="0.9"/>
  <rect x="108" y="80" width="40" height="28" rx="4" fill="#E0F2FE" opacity="0.7"/>
  <rect x="176" y="160" width="40" height="28" rx="4" fill="#E0F2FE" opacity="0.5"/>
  
  <!-- Burndown diagonal line with dots -->
  <circle cx="50" cy="70" r="6" fill="url(#grad-burndown-a)"/>
  <circle cx="128" cy="128" r="6" fill="url(#grad-burndown-a)"/>
  <circle cx="206" cy="186" r="6" fill="url(#grad-burndown-a)"/>
  <line x1="50" y1="70" x2="128" y2="128" stroke="url(#grad-burndown-a)" stroke-width="4" stroke-linecap="round"/>
  <line x1="128" y1="128" x2="206" y2="186" stroke="url(#grad-burndown-a)" stroke-width="4" stroke-linecap="round"/>
</svg>
