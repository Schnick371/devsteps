<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <title>DevSteps v1 — Staircase Solid</title>
  <defs>
    <linearGradient id="g1" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>
  <!-- Three ascending step blocks — pure staircase silhouette -->
  <!-- Step 1: bottom-left (tallest) -->
  <rect x="12" y="48" width="32" height="68" rx="4" fill="url(#g1)"/>
  <!-- Step 2: middle -->
  <rect x="48" y="28" width="32" height="88" rx="4" fill="url(#g1)" opacity="0.82"/>
  <!-- Step 3: top-right (reaches top) -->
  <rect x="84" y="8" width="32" height="108" rx="4" fill="url(#g1)" opacity="0.65"/>
</svg>
