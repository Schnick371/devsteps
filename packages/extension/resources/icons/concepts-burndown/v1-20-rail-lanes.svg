<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-rail-20" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1D4ED8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0EA5E9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-switch-20" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22D3EE;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#38BDF8;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  
  <!-- CRT-style frame -->
  <path d="M 34 8 
           Q 128 0, 222 8
           Q 252 8, 252 34
           Q 256 128, 252 222
           Q 252 252, 222 252
           Q 128 256, 34 252
           Q 4 252, 4 222
           Q 0 128, 4 34
           Q 4 8, 34 8 Z" 
        fill="none" 
        stroke="#FFFFFF" 
        stroke-width="7" 
        opacity="0.5"/>
  
  <!-- Six thick parallel lanes (straight left-to-right) -->
  <line x1="16" y1="60" x2="240" y2="60" stroke="url(#grad-rail-20)" stroke-width="18" stroke-linecap="round"/>
  <line x1="16" y1="90" x2="240" y2="90" stroke="url(#grad-rail-20)" stroke-width="18" stroke-linecap="round"/>
  <line x1="16" y1="120" x2="240" y2="120" stroke="url(#grad-rail-20)" stroke-width="18" stroke-linecap="round"/>
  <line x1="16" y1="150" x2="240" y2="150" stroke="url(#grad-rail-20)" stroke-width="18" stroke-linecap="round"/>
  <line x1="16" y1="180" x2="240" y2="180" stroke="url(#grad-rail-20)" stroke-width="18" stroke-linecap="round"/>
  <line x1="16" y1="210" x2="240" y2="210" stroke="url(#grad-rail-20)" stroke-width="18" stroke-linecap="round"/>
  
  <!-- Steep switches (short, crisp) -->
  <path d="M 140 90 L 160 110" stroke="url(#grad-switch-20)" stroke-width="10" stroke-linecap="round"/>
  <path d="M 120 150 L 140 170" stroke="url(#grad-switch-20)" stroke-width="10" stroke-linecap="round"/>
</svg>
