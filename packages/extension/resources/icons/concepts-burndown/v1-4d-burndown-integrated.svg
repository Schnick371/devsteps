<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-col-d" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-chart-d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#EF4444;stop-opacity:0.15" />
    </linearGradient>
    <linearGradient id="grad-line-d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EF4444;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Chart background area (burndown fill) -->
  <path d="M 32 60 L 224 60 L 224 200 Q 128 120, 32 60 Z" fill="url(#grad-chart-d)"/>
  
  <!-- Three columns decreasing -->
  <rect x="40" y="64" width="52" height="136" rx="8" fill="url(#grad-col-d)" opacity="0.75"/>
  <rect x="104" y="96" width="52" height="104" rx="8" fill="url(#grad-col-d)" opacity="0.75"/>
  <rect x="168" y="136" width="52" height="64" rx="8" fill="url(#grad-col-d)" opacity="0.75"/>
  
  <!-- Cards inside columns -->
  <rect x="48" y="76" width="36" height="22" rx="3" fill="#E0F2FE" opacity="0.9"/>
  <rect x="48" y="106" width="36" height="22" rx="3" fill="#E0F2FE" opacity="0.9"/>
  <rect x="48" y="136" width="36" height="22" rx="3" fill="#E0F2FE" opacity="0.9"/>
  <rect x="112" y="108" width="36" height="22" rx="3" fill="#E0F2FE" opacity="0.7"/>
  <rect x="176" y="148" width="36" height="22" rx="3" fill="#E0F2FE" opacity="0.5"/>
  
  <!-- Burndown curve line -->
  <path d="M 32 60 Q 128 100, 224 200" 
        stroke="url(#grad-line-d)" 
        stroke-width="5" 
        stroke-linecap="round" 
        fill="none"/>
  
  <!-- Chart points -->
  <circle cx="32" cy="60" r="7" fill="#F59E0B" stroke="#FFF" stroke-width="2"/>
  <circle cx="128" cy="110" r="7" fill="#F97316" stroke="#FFF" stroke-width="2"/>
  <circle cx="224" cy="200" r="7" fill="#EF4444" stroke="#FFF" stroke-width="2"/>
</svg>
