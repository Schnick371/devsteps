<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <title>DevSteps v6 — Sprint Loop Steps (Agile Cycle)</title>
  <defs>
    <linearGradient id="g6a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </linearGradient>
    <linearGradient id="g6b" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
  <!-- Circular arc (sprint loop) — 270° arc, open at top-right -->
  <path d="M 64 16 A 48 48 0 1 0 112 64"
    fill="none" stroke="url(#g6b)" stroke-width="10" stroke-linecap="round"/>
  <!-- Arrow head at arc end — pointing up/right like sprint velocity -->
  <polyline points="100,44 112,64 92,68"
    fill="none" stroke="url(#g6b)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Three step dots ON the arc — marking iterations -->
  <circle cx="64" cy="16" r="8" fill="url(#g6a)"/>
  <circle cx="16" cy="64" r="8" fill="url(#g6a)" opacity="0.7"/>
  <circle cx="64" cy="112" r="8" fill="url(#g6a)" opacity="0.45"/>
</svg>
